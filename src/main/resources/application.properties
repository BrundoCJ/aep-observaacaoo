spring.application.name=observaacao
server.port=${PORT:8080}
spring.jackson.serialization.write-dates-as-timestamps=false

# ── H2 Database — arquivo persistente (dados sobrevivem ao restart) ──
spring.datasource.url=jdbc:h2:file:./data/observaacao;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# H2 Console — acesse http://localhost:8080/h2-console para ver os dados
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
